<!DOCTYPE html>
<html>

<head>

    <title>Shopee CLI Tool</title>

    <style>

        body{
            background:#0c0c0c;
            color:#00ff00;
            font-family:monospace;
            padding:20px;
        }

        #terminal{
            height:500px;
            overflow:auto;
            white-space:pre-wrap;
            font-family:monospace;
        }

        input{
            background:#000;
            border:none;
            color:#00ff00;
            width:100%;
            outline:none;
            font-family:monospace;
            font-size:16px;
        }
        #downloadItems{
            position:fixed;
            top:10px;
            right:10px;
            background:#111;
            color:#0f0;
            border:1px solid #0f0;
            padding:8px 12px;
            cursor:pointer;
        }
        #actions{
            margin-top:10px;
        }



        #bottomPanel{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#0c0c0c;
            padding:10px;
            border-top:1px solid #0f0;
        }

        /* terminal không bị che */
        #terminal{
            height:calc(100vh - 160px);
        }

        /* nút */
        #actions{
            display:flex;
            gap:10px;
            margin-bottom:10px;
        }

        #actions button{
            background:#111;
            color:#0f0;
            border:1px solid #0f0;
            padding:6px 10px;
            cursor:pointer;
        }

        /* progress */
        #progressBox{
            display:none;
            margin-bottom:10px;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        #progressBar{
            width:300px;   /* 👈 thu nhỏ lại */
            height:8px;
            background:#222;
            border:1px solid #0f0;
        }

        #progressFill{
            height:100%;
            width:0%;
            background:#0f0;
        }

        /* input */
        #cmd{
            width:100%;
            background:#000;
            color:#0f0;
            border:none;
            outline:none;
            font-family:monospace;
        }

    </style>

</head>

<body>

<h2>Shopee CLI Tool</h2>
<h2>Shopee CLI Tool</h2>

<!-- 👇 thêm dòng này -->
<div id="terminal"></div>

<div id="bottomPanel">

    <div id="actions">
        <button id="downloadItems">Download list item</button>
        <button id="downloadMedia">Download Video Image</button>
    </div>

    <div id="progressBox">
        <div id="progressText">Progress: 0%</div>
        <div id="progressBar">
            <div id="progressFill"></div>
        </div>
    </div>

    <input id="cmd" autofocus placeholder="type command...">
</div>

<input type="file" id="jsonFile" hidden>
<script>

    let eventSource = null
    const terminal = document.getElementById("terminal")
    const cmd = document.getElementById("cmd")
    const progressBox = document.getElementById("progressBox")
    const progressText = document.getElementById("progressText")
    const progressFill = document.getElementById("progressFill")
    progressBox.style.display = "block"
    function log(text){
        terminal.innerHTML += "<pre>> " + text + "</pre>"
        terminal.scrollTop = terminal.scrollHeight
    }
    document.getElementById("downloadItems").onclick = async () => {

        const res = await fetch("/get_items")

        const data = await res.json()

        const blob = new Blob(
            [JSON.stringify(data,null,2)],
            { type:"application/json" }
        )

        const url = URL.createObjectURL(blob)

        const a = document.createElement("a")

        a.href = url
        a.download = "item_list.json"

        a.click()

    }
    document.getElementById("downloadMedia").onclick = () => {

        log("Starting download...")

        progressBox.style.display = "block"

        const eventSource = new EventSource("/progress")

        eventSource.onmessage = function(event) {

            const percent = parseInt(event.data)

            progressText.innerText = "Progress: " + percent + "%"

            progressFill.style.width = percent + "%"

            if (percent >= 100) {
                progressText.innerText = "Done ✅"
                eventSource.close()
            }
        }

        const a = document.createElement("a")
        a.href = "/download_media"
        a.download = "media.zip"
        a.click()
    }
    document.getElementById("jsonFile").onchange = async function(){

        const file = this.files[0]

        const form = new FormData()

        form.append("file",file)

        log("Processing items...")

        const res = await fetch("/get_item_base",{
            method:"POST",
            body:form
        })

        const data = await res.json()

        log(JSON.stringify(data,null,2))

    }

    cmd.addEventListener("keydown",async(e)=>{

        if(e.key==="Enter"){

            const command = cmd.value

            log(command)

            if(command==="connect shop"){

                log("Opening Shopee authorization...")
                window.open("/connect")

            }

            else if(command==="get_item_list"){

                log("Loading items...")

                const res = await fetch("/get_items")

                const data = await res.json()

                log(JSON.stringify(data,null,2))

            }
            else if(command==="get_item_base"){

                log("Upload JSON file containing item_id list...")

                document.getElementById("jsonFile").click()

            }

            else{

                log("Unknown command")

            }

            cmd.value=""

        }

    })

</script>
</body>

</html>
