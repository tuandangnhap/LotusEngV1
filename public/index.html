<!DOCTYPE html>
<html>

<head>

    <title>Shopee CLI Tool</title>

    <style>

        body{
            background:#0c0c0c;
            color:#00ff00;
            font-family:monospace;
            padding:20px;
        }

        #terminal{
            height:500px;
            overflow:auto;
            white-space:pre-wrap;
            font-family:monospace;
        }

        input{
            background:#000;
            border:none;
            color:#00ff00;
            width:100%;
            outline:none;
            font-family:monospace;
            font-size:16px;
        }
        #downloadItems{
            position:fixed;
            top:10px;
            right:10px;
            background:#111;
            color:#0f0;
            border:1px solid #0f0;
            padding:8px 12px;
            cursor:pointer;
        }
        #actions{
            margin-top:10px;
        }



        #bottomPanel{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#0c0c0c;
            padding:10px;
            border-top:1px solid #0f0;
        }

        /* terminal không bị che */
        #terminal{
            height:calc(100vh - 160px);
        }

        /* nút */
        #actions{
            display:flex;
            gap:10px;
            margin-bottom:10px;
        }

        #actions button{
            background:#111;
            color:#0f0;
            border:1px solid #0f0;
            padding:6px 10px;
            cursor:pointer;
        }

        /* progress */
        #progressBox{
            display:none;
            margin-bottom:10px;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        #progressBar{
            width:300px;   /* 👈 thu nhỏ lại */
            height:8px;
            background:#222;
            border:1px solid #0f0;
        }

        #progressFill{
            height:100%;
            width:0%;
            background:#0f0;
        }

        /* input */
        #cmd{
            width:100%;
            background:#000;
            color:#0f0;
            border:none;
            outline:none;
            font-family:monospace;
        }

    </style>

</head>

<body>

<h2>Shopee CLI Tool</h2>

<!-- 👇 thêm dòng này -->
<div id="terminal"></div>

<div id="bottomPanel">

    <div id="actions">
        <button id="downloadItems">Download list item</button>
        <button id="downloadMedia">Download Video Image</button>
        <button onclick="saveJson()">Save JSON</button>
    </div>

    <div id="progressBox">
        <div id="progressText">Progress: 0%</div>
        <div id="progressBar">
            <div id="progressFill"></div>
        </div>
    </div>

    <input id="cmd" autofocus placeholder="type command...">
</div>

<input type="file" id="jsonFile" hidden>
<input type="file" id="imageFile" accept="image/*" hidden>
<script>

    let eventSource = null
    let updateMode = false
    let updateItemIds = []
    const terminal = document.getElementById("terminal")
    const cmd = document.getElementById("cmd")
    const progressBox = document.getElementById("progressBox")
    const progressText = document.getElementById("progressText")
    const progressFill = document.getElementById("progressFill")
    progressBox.style.display = "block"
    function log(text){
        terminal.innerHTML += "<pre>> " + text + "</pre>"
        terminal.scrollTop = terminal.scrollHeight
    }
    function saveJson() {
        window.open("/download_json")
    }
    function chunkObject(obj, size = 10) {
        const entries = Object.entries(obj)
        const chunks = []

        for (let i = 0; i < entries.length; i += size) {
            const part = Object.fromEntries(entries.slice(i, i + size))
            chunks.push(part)
        }

        return chunks
    }
    document.getElementById("downloadItems").onclick = async () => {

        const res = await fetch("/get_items")

        const data = await res.json()

        const blob = new Blob(
            [JSON.stringify(data,null,2)],
            { type:"application/json" }
        )

        const url = URL.createObjectURL(blob)

        const a = document.createElement("a")

        a.href = url
        a.download = "item_list.json"

        a.click()

    }
    document.getElementById("imageFile").onchange = async function(){

        const file = this.files[0]
        if (!file) return

        const form = new FormData()
        form.append("image", file)

        log("Uploading image...")

        try{

            const res = await fetch("/upload_image",{
                method:"POST",
                body:form
            })

            const data = await res.json()

            if(data.url){
                log("✅ Upload success:")
                log(data.url)
            }else{
                log("❌ Upload failed:")
                log(JSON.stringify(data))
            }

        }catch(e){
            log("ERROR: " + e.message)
        }
    }
    let currentPart = 0
    let totalParts = 0
    let initialized = false

    document.getElementById("downloadMedia").onclick = async () => {

        try {

            // 👉 Lần đầu: lấy tổng part
            if (!initialized) {

                log("Getting total parts...")

                const res = await fetch("/total_parts")
                const data = await res.json()

                totalParts = data.total
                initialized = true

                log("Total parts: " + totalParts)
            }

            // 👉 nếu đã hết
            if (currentPart >= totalParts) {
                log("All parts downloaded ✅")
                return
            }

            log(`Download part ${currentPart}`)

            // 👉 trigger download
            const a = document.createElement("a")
            a.href = `/download_media_part?part=${currentPart}`
            a.download = `media_part_${currentPart}.zip`

            document.body.appendChild(a)
            a.click()
            a.remove()

            currentPart++

            // 👉 update progress
            const percent = Math.floor((currentPart / totalParts) * 100)
            progressText.innerText = `Progress: ${percent}% (${currentPart}/${totalParts})`
            progressFill.style.width = percent + "%"

            if (currentPart >= totalParts) {
                log("DONE ALL 🎉")
            }

        } catch (e) {
            log("Error: " + e.message)
        }
    }
    document.getElementById("jsonFile").onchange = async function () {
        const file = this.files[0]
        if (!file) return

        const text = await file.text()

        try {

            // ===== FIX BOM + TRIM =====
            const cleanText = text.replace(/^\uFEFF/, "").trim()

            const json = JSON.parse(cleanText)

            // ===== MODE UPDATE ITEM =====
            // ===== MODE UPDATE ITEM =====
            if (updateMode === "item") {

                const cleanText = text.replace(/^\uFEFF/, "").trim()
                const json = JSON.parse(cleanText)

                const chunks = chunkObject(json, 10)

                log("📦 Total chunks: " + chunks.length)

                for (let i = 0; i < chunks.length; i++) {

                    log(`Uploading chunk ${i + 1}/${chunks.length}`)

                    const res = await fetch("/update_item_media", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(chunks[i])
                    })

                    const raw = await res.text()

                    log("RAW RESPONSE:")
                    log(raw || "EMPTY RESPONSE ❌")
                }

                log("DONE ALL CHUNKS 🎉")

                updateMode = false
                return
            }

            // ===== MODE CŨ: get_item_base =====
            const form = new FormData()
            form.append("file", file)

            log("Processing items...")

            const res = await fetch("/get_item_base", {
                method: "POST",
                body: form
            })

            const data = await res.json()

            log(JSON.stringify(data, null, 2))

        } catch (e) {
            log("❌ Invalid JSON file: " + e.message)
        }
    }

    cmd.addEventListener("keydown",async(e)=>{

        if(e.key==="Enter"){

            const command = cmd.value

            // 👉 nếu đang update
            if(updateMode && updateItemIds.length){

                const imageUrl = command

                log("Updating items...")
                log("Image URL: " + imageUrl)

                const res = await fetch("/update_items_image",{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        item_ids: updateItemIds,
                        image_url: imageUrl
                    })
                })

                const raw = await res.text()

                let data
                try {
                    data = JSON.parse(raw)
                } catch (e) {
                    log("❌ Server trả về KHÔNG phải JSON:")
                    log(raw.slice(0, 300))
                    return
                }

                log(JSON.stringify(data,null,2))

                // reset
                updateMode = false
                updateItemIds = []

                cmd.value=""
                return
            }

            log(command)

            if(command==="connect shop"){

                log("Opening Shopee authorization...")
                window.open("/connect")

            }
            else if(command==="update_item"){
                log("Upload JSON file (update image + video)...")
                updateMode = "item"
                document.getElementById("jsonFile").click()
            }
            else if(command==="update_image"){
                log("Upload JSON file (item_id list)...")
                updateMode = true
                document.getElementById("jsonFile").click()
            }

            else if(command==="get_item_list"){

                log("Loading items...")

                const res = await fetch("/get_items")

                const data = await res.json()

                log(JSON.stringify(data,null,2))

            }
            else if(command==="get_item_base"){

                log("Upload JSON file containing item_id list...")

                document.getElementById("jsonFile").click()

            }
            else if(command==="up_image"){

                log("Select image to upload...")
                document.getElementById("imageFile").click()

            }

            else{

                log("Unknown command")

            }

            cmd.value=""

        }

    })

</script>
</body>

</html>
