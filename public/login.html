<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input{
display:block;
margin:10px 0;
padding:10px;
width:200px;
}
button{
padding:10px;
width:100%;
}
</style>
</head>

<body>

<div class="box">

<h2>Shopee Seller Tool</h2>

<form method="POST" action="/login">

<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
